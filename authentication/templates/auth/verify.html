{% extends 'base.html' %}
{% load static %}

{% block title %}Verify Email | ChessWeb{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{% static 'images/ChessCraft Logo.png' %}" class="auth-logo">
            <h2>Verify Your Email</h2>
            <p>We've sent a 6-digit code to your email.</p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="otp">One-Time Password (OTP)</label>
                <input type="text" name="otp" id="otp" class="auth-input" placeholder="123456" required autocomplete="off">
            </div>

            <button type="submit" class="auth-btn">Verify Account</button>
        </form>

        <div class="auth-footer">
            Didn't receive the code? <br><br>
            <a href="{% url 'resend_otp' user_id %}" class="auth-link">Resend OTP</a>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %}Forgot Password | ChessWeb{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{% static 'images/ChessCraft Logo.png' %}" class="auth-logo">
            <h2>Reset Password</h2>
            <p>Enter your email address to receive an OTP.</p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="auth-input" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="auth-btn">Request OTP</button>
        </form>

        <div class="auth-footer">
            Remembered your password? <a href="{% url 'login' %}" class="auth-link">Log In</a>
        </div>
    </div>
</div>
{% endblock %}

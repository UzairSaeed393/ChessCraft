{% extends 'base.html' %}
{% load static %}

{% block title %}Create New Password | ChessWeb{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{% static 'images/ChessCraft Logo.png' %}" class="auth-logo">
            <h2>New Password</h2>
            <p>Create a secure password for your account.</p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" class="auth-input" placeholder="Password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Show password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" class="auth-input" placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password', this)" aria-label="Show password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-btn">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
